{% extends "base.html" %}
{% block title %}Savings Goals — Budget Planner{% endblock %}
{% block page_title %}Savings Goals{% endblock %}

{% block content %}
<div class="page-header">
  <div>
    <div class="page-title">Savings Goals</div>
    <div class="page-subtitle">Set targets and track your progress</div>
  </div>
  <button class="btn btn-primary" id="btn-add-savings">
    <i class="fas fa-plus"></i> Add Goal
  </button>
</div>

<div class="goal-grid" id="savings-grid">
  <div class="empty-state"><div class="spinner"></div></div>
</div>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="savings-modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="savings-modal-title">Add Savings Goal</span>
      <button class="modal-close" onclick="closeModal('savings-modal')"><i class="fas fa-times"></i></button>
    </div>
    <form id="savings-form">
      <div class="modal-body">
        <div class="form-group mb-2">
          <label class="form-label">Goal Name</label>
          <input id="savings-name" class="form-control" type="text" placeholder="e.g. Emergency Fund, Down Payment" required />
        </div>
        <div class="form-grid mb-2">
          <div class="form-group">
            <label class="form-label">Current Amount ($)</label>
            <input id="savings-current" class="form-control" type="number" min="0" step="0.01" placeholder="0" />
          </div>
          <div class="form-group">
            <label class="form-label">Goal Amount ($)</label>
            <input id="savings-goal" class="form-control" type="number" min="0" step="0.01" placeholder="10000" required />
          </div>
        </div>
        <div class="form-group mb-2">
          <label class="form-label">Monthly Contribution ($)</label>
          <input id="savings-contrib" class="form-control" type="number" min="0" step="0.01" placeholder="500" />
        </div>
        <div class="form-group">
          <label class="form-label">Notes (optional)</label>
          <textarea id="savings-notes" class="form-control" rows="2" placeholder="e.g. In HYSA at 5% APY"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-outline" onclick="closeModal('savings-modal')">Cancel</button>
        <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Save</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>initSavings();</script>
{% endblock %}
